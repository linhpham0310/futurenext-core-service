name: Deploy Core Service to Cloud Run (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/futurenext-core-service:${{ github.sha }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_ARTIFACT_REGISTRY }}
  GCP_CLOUD_RUN_SERVICE_STAGING: ${{ secrets.GCP_CLOUD_RUN_SERVICE_STAGING }}
  GCP_CLOUD_RUN_REGION: ${{ secrets.GCP_CLOUD_RUN_REGION }}

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gcloud
        run: |
          gcloud config unset api_endpoint_overrides/run 2>/dev/null || true
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.GCP_CLOUD_RUN_SERVICE_STAGING }}
          region: ${{ env.GCP_CLOUD_RUN_REGION }}
          image: ${{ env.IMAGE_NAME }}
          secrets: |
            DATABASE_URL=DATABASE_URL_STAGING:latest
            REDIS_URL=REDIS_URL_STAGING:latest
            JWT_SECRET=JWT_SECRET_STAGING:latest
            REFRESH_TOKEN_SECRET=REFRESH_TOKEN_SECRET_STAGING:latest
            SMTP_HOST=SMTP_HOST_STAGING:latest
            SMTP_PORT=SMTP_PORT_STAGING:latest
            SMTP_USER=SMTP_USER_STAGING:latest
            SMTP_PASS=SMTP_PASS_STAGING:latest
            EMAIL_FROM=EMAIL_FROM_STAGING:latest
            EMAIL_SECURE=EMAIL_SECURE_STAGING:latest
          env_vars: |
            NODE_ENV=staging
            PORT=8080
            CURRENT_CONSENT_VERSION=v2025-10-26
