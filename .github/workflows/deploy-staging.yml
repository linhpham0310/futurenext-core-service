# .github/workflows/deploy-staging.yml
# Workflow này tự động build, test, và deploy backend lên Cloud Run (Staging)
# khi có push hoặc merge vào nhánh 'main'.

name: Deploy Core Service to Cloud Run (Staging)

on:
  push:
    [cite_start]branches: [ main ] # Trigger khi push/merge vào nhánh main [cite: 4846, 4979]
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions

# Biến môi trường chung cho workflow
env:
  # Tên image sẽ được build, gắn tag bằng SHA của commit
  [cite_start]IMAGE_NAME: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/futurenext-core-service:${{ github.sha }} [cite: 4848-4849, 4981-4982]
  # Tên các secret trong GitHub Actions Secrets (đã tạo ở Sprint 0)
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }} # Service Account Key JSON
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_ARTIFACT_REGISTRY }}
  GCP_CLOUD_RUN_SERVICE_STAGING: ${{ secrets.GCP_CLOUD_RUN_SERVICE_STAGING }} # Tên service Staging
  GCP_CLOUD_RUN_REGION: ${{ secrets.GCP_CLOUD_RUN_REGION }} # Vd: asia-southeast1
  STAGING_EMAIL_FROM: ${{ secrets.STAGING_EMAIL_FROM }} # Email From (không quá nhạy cảm, có thể để ở GitHub Secret)

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    permissions: # Cấp quyền cho GitHub Actions
      contents: 'read'
      [cite_start]id-token: 'write' # Cần cho xác thực GCP an toàn (Workload Identity) [cite: 4855]

    steps:
      # Bước 1: Checkout mã nguồn
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 4858]

      # Bước 2: Cài đặt Node.js
      - name: Set up Node.js
        [cite_start]uses: actions/setup-node@v4 [cite: 4860]
        with:
          [cite_start]node-version: '24' # Sử dụng phiên bản Node LTS [cite: 4862]

      # Bước 3: Cài đặt dependencies
      - name: Install dependencies
        run: npm ci # Dùng npm ci để cài đặt chính xác từ package-lock.json

      # Bước 4: Chạy Unit Tests (Bắt buộc)
      - name: Run unit tests
        run: npm run test # Đảm bảo test pass trước khi deploy

      # Bước 5: Xác thực với Google Cloud
      - name: Authenticate to Google Cloud
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          [cite_start]credentials_json: ${{ env.GCP_SA_KEY }} [cite: 4873, 5005] # Dùng Service Account Key (đã lưu trong GitHub Secrets)
          # Lưu ý: Workload Identity Federation là cách an toàn hơn [cite: 4875-4878], sẽ nâng cấp sau nếu cần

      # Bước 6: Cấu hình Docker Buildx
      - name: Set up Docker Buildx
        [cite_start]uses: docker/setup-buildx-action@v3 [cite: 4882]

      # Bước 7: Đăng nhập vào Google Artifact Registry
      - name: Login to Artifact Registry
        [cite_start]uses: docker/login-action@v3 [cite: 4884]
        with:
          registry: ${{ env.GCP_ARTIFACT_REGISTRY_HOST | split('/')[0] }} # Trích xuất host (vd: asia-southeast1-docker.pkg.dev)
          username: _json_key
          [cite_start]password: ${{ env.GCP_SA_KEY }} [cite: 4889, 5021]

      # Bước 8: Build và Push Docker image
      - name: Build and push Docker image
        [cite_start]uses: docker/build-push-action@v5 [cite: 4891]
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bước 9: Deploy to Cloud Run (ĐÂY LÀ BƯỚC CẬP NHẬT CHÍNH)
      - name: Deploy to Cloud Run (Staging)
        [cite_start]uses: google-github-actions/deploy-cloudrun@v2 [cite: 4900]
        with:
          service: ${{ env.GCP_CLOUD_RUN_SERVICE_STAGING }} # Tên service Staging
          region: ${{ env.GCP_CLOUD_RUN_REGION }} # Region
          image: ${{ env.IMAGE_NAME }} # Image vừa build

          # --- Cấu hình Inject Secrets từ Secret Manager (S1-SYS-02) ---
          # Map TÊN BIẾN MÔI TRƯỜNG (app đọc) = TÊN SECRET (trong Secret Manager):phiên bản
          secrets: |
            DATABASE_URL=futurenext-staging-db-url:latest
            REDIS_URL=futurenext-staging-redis-url:latest
            JWT_SECRET=futurenext-staging-jwt-secret:latest
            REFRESH_TOKEN_SECRET=futurenext-staging-refresh-secret:latest
            SMTP_HOST=futurenext-staging-smtp-host:latest
            SMTP_PORT=futurenext-staging-smtp-port:latest
            SMTP_USER=futurenext-staging-smtp-user:latest
            SMTP_PASS=futurenext-staging-smtp-pass:latest
            EMAIL_FROM=futurenext-staging-email-from:latest
            EMAIL_SECURE=futurenext-staging-email-secure:latest

          # --- Cấu hình Biến Môi trường KHÔNG NHẠY CẢM ---
          env_vars: |
            NODE_ENV=staging # Đặt môi trường là staging
            PORT=8080 # Cloud Run mặc định gửi request đến port 8080
            CURRENT_CONSENT_VERSION=v2025-10-26 # Đặt phiên bản consent
            # Thêm các biến không nhạy cảm khác nếu cần
