name: Deploy Core Service to Cloud Run (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/futurenext-core-service:${{ github.sha }}
  GCP_CLOUD_RUN_SERVICE_STAGING: ${{ secrets.GCP_CLOUD_RUN_SERVICE_STAGING }}
  GCP_CLOUD_RUN_REGION: ${{ secrets.GCP_CLOUD_RUN_REGION }}

jobs:
  # ============================================================
  # JOB 1: Build & Push Docker image
  # ============================================================
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2: Chạy migration dùng Direct URL (port 5432)
  # ============================================================
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build TypeORM
        run: npm run build

      # Bước 1: TypeORM migrations (Bootstrap extensions + Auth schema)
      - name: Run TypeORM migrations
        run: npx typeorm migration:run -d dist/src/config/data-source.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT_STAGING }}
          NODE_ENV: staging

      # Bước 2: Prisma migrations (course_mgmt + lx schemas)
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT_STAGING }}
          DIRECT_URL: ${{ secrets.DATABASE_URL_DIRECT_STAGING }} # ← thêm dòng này

  # ============================================================
  # JOB 3: Deploy lên Cloud Run (chỉ chạy sau khi migrate xong)
  # ============================================================
  deploy:
    name: Deploy to Cloud Run Staging
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gcloud
        run: |
          gcloud config unset api_endpoint_overrides/run 2>/dev/null || true
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy $GCP_CLOUD_RUN_SERVICE_STAGING \
            --image $IMAGE_NAME \
            --region $GCP_CLOUD_RUN_REGION \
            --port 8080 \
            --allow-unauthenticated \
            --update-secrets DATABASE_URL=DATABASE_URL_STAGING:latest,REDIS_URL=REDIS_URL_STAGING:latest,JWT_SECRET=JWT_SECRET_STAGING:latest,REFRESH_TOKEN_SECRET=REFRESH_TOKEN_SECRET_STAGING:latest,SMTP_HOST=SMTP_HOST_STAGING:latest,SMTP_PORT=SMTP_PORT_STAGING:latest,SMTP_USER=SMTP_USER_STAGING:latest,SMTP_PASS=SMTP_PASS_STAGING:latest,SMTP_FROM=EMAIL_FROM_STAGING:latest,EMAIL_FROM=EMAIL_FROM_STAGING:latest,EMAIL_SECURE=EMAIL_SECURE_STAGING:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,CORS_ORIGINS=CORS_ORIGINS_STAGING:latest \
            --set-env-vars NODE_ENV=staging,CURRENT_CONSENT_VERSION=v2025-10-26,CORS_ORIGINS=https://futurenext-frontend-staging.vercel.app,REFRESH_TOKEN_EXPIRES_IN=7d \
            --platform managed
