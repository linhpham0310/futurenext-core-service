version: '3.8'

services:
  postgres_dev:
    image: postgres:15
    container_name: futurenext_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-futurenext_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password123}
      POSTGRES_DB: ${POSTGRES_DB:-futurenext_dev}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis_dev:
    image: redis:7
    container_name: futurenext_redis_dev
    restart: always
    ports:
      - '${REDIS_PORT:-6380}:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
